name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check deckdrop/ tests/

      - name: Run tests
        run: python -m pytest --tb=short -v --ignore=tests/test_frontend.py

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install ruff

      - name: Check formatting
        run: ruff format --check deckdrop/ tests/

  frontend:
    name: Frontend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JS syntax
        run: |
          for f in frontend/api.js frontend/app.js frontend/components/*.js; do
            node --check "$f" || exit 1
          done

      - name: Verify required files exist
        run: |
          for f in \
            frontend/index.html \
            frontend/style.css \
            frontend/app.js \
            frontend/api.js \
            frontend/components/Onboarding.js \
            frontend/components/Nav.js \
            frontend/components/GameCard.js \
            frontend/components/MyGames.js \
            frontend/components/AddGame.js \
            frontend/components/Network.js \
            frontend/components/Downloads.js \
            frontend/components/Settings.js; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All frontend files present."

      - name: Check import consistency
        run: |
          # Every component must import from htm/preact (no raw preact/h calls that bypass htm)
          for f in frontend/components/*.js; do
            grep -q "htm/preact" "$f" || { echo "Missing htm/preact import in $f"; exit 1; }
          done
          # api.js must not import from htm (it's a pure data module)
          if grep -q "htm" frontend/api.js; then
            echo "api.js should not import htm"; exit 1
          fi
          echo "Import consistency OK."

  flatpak-sources:
    name: Flatpak sources not placeholder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check python3-deckdrop-deps.json is populated
        run: |
          python3 - << 'EOF'
          import json, sys
          with open("packaging/python3-deckdrop-deps.json") as f:
              data = json.load(f)
          modules = data.get("modules", [])
          if not modules:
              print("ERROR: python3-deckdrop-deps.json has no modules (still a placeholder).")
              print("Run: bash packaging/generate-flatpak-sources.sh")
              sys.exit(1)
          total_sources = sum(len(m.get("sources", [])) for m in modules)
          if total_sources == 0:
              print("ERROR: All modules have empty sources (placeholder not replaced).")
              sys.exit(1)
          print(f"OK: {len(modules)} modules, {total_sources} sources.")
          EOF

  e2e:
    name: Frontend e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run e2e tests
        run: python -m pytest tests/test_frontend.py --tb=short -v
